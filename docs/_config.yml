title: 0️⃣🚀 zero-release
description: Zero-runtime-dependency semantic release automation for GitHub Actions, written in Bash.
baseurl: "/zero-release"
url: "https://zero-release.github.io"

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

color_scheme: light
search_enabled: true
heading_anchors: true
permalink: pretty
mermaid:
  version: "10.9.3"

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

aux_links:
  GitHub:
    - https://github.com/zero-release/zero-release

footer_content: "0️⃣🚀 zero-release · Zero-runtime-dependency semantic release automation."

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
